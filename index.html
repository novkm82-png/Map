html,body,#map{width:100%;height:100%}

#header p{font-size:10px;color:#b090c8;letter-spacing:1px;margin-top:1px}
.resort-marker{cursor:pointer;filter:drop-shadow(0 3px 8px rgba(150,90,190,0.3));transition:transform 0.2s,filter 0.2s;animation:pulse 4s ease-in-out infinite}
.resort-marker:hover{transform:scale(1.15);animation:none;filter:drop-shadow(0 5px 14px rgba(150,90,190,0.5))}
@keyframes pulse{0%,100%{opacity:0.88}50%{opacity:1}}
.resort-lbl{background:none!important;border:none!important;font-family:'Playfair Display',serif;color:#6a2888;font-size:11px;font-weight:700;font-style:italic;white-space:nowrap;text-shadow:1px 1px 0 #fff8ff,-1px -1px 0 #fff8ff,0 0 8px #fff8ff;pointer-events:none}
.lm-icon{cursor:pointer;transform-style:preserve-3d;perspective:120px}
.lm-box{width:60px;height:60px;border-radius:12px;overflow:hidden;border:1.5px solid rgba(200,150,230,0.45);box-shadow:0 4px 14px rgba(140,90,180,0.22);transform:rotateX(10deg) rotateY(-3deg);transition:transform 0.35s,box-shadow 0.35s;animation:float 4s ease-in-out infinite}

@keyframes steam{0%{opacity:0;transform:translateY(0)}50%{opacity:0.7}100%{opacity:0;transform:translateY(-14px)}}
@keyframes sway{0%,100%{transform-origin:bottom;transform:rotate(-4deg)}50%{transform-origin:bottom;transform:rotate(4deg)}}
@keyframes glow{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.city-lbl{background:none!important;border:none!important;font-family:'Lora',serif;color:#9070a8;font-size:10px;white-space:nowrap;text-shadow:1px 1px 0 #fffbff,-1px -1px 0 #fffbff;pointer-events:none}
.city-lbl.big{color:#5a3878;font-weight:600}
.city-dot{width:4px;height:4px;background:#c8a0e0;border-radius:50%}
.city-dot.big{width:6px;height:6px;background:#9068b0}

#panel.open{transform:translateY(0)}
#ph{width:38px;height:4px;background:rgba(200,155,230,0.38);border-radius:2px;margin:10px auto 0;cursor:pointer}

.fb{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}

.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.src{font-size:9px;color:#c098d8}
.snote{font-size:11px;color:#a080b8;margin-top:4px;line-height:1.4}

#legend{position:fixed;bottom:16px;left:12px;z-index:1000;background:rgba(255,252,255,0.95);border:1px solid rgba(200,155,230,0.26);border-radius:12px;padding:8px 10px;box-shadow:0 2px 10px rgba(140,90,180,0.09);max-width:198px}

#ltog::after{content:'▲';font-size:8px;transition:transform 0.2s}

#lbody{margin-top:6px}
#lbody.h{display:none}
.li{display:flex;align-items:center;gap:6px;font-size:10px;color:#9a70b8;padding:2px 0}
.lc{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.bf{position:absolute;animation:flutter 6s ease-in-out infinite;opacity:0.6}

function pie(factors, r) {
  r = r || 20;
  var n = factors.length, cx = r+5, cy = r+5, step = 2*Math.PI/n, p = '';
  for(var i=0; i<n; i++) {
    var a0=i*step-Math.PI/2, a1=(i+1)*step-Math.PI/2;
    var x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0), x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    var laf=step>Math.PI?1:0, col=F[factors[i]].c;
    if(n===1) p+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+col+'" stroke="white" stroke-width="2"/>';
    else p+='<path d="M'+cx+','+cy+' L'+x0.toFixed(1)+','+y0.toFixed(1)+' A'+r+','+r+' 0 '+laf+',1 '+x1.toFixed(1)+','+y1.toFixed(1)+' Z" fill="'+col+'" stroke="white" stroke-width="1.2"/>';
  }
  var sz=(r+5)*2;
  return '<svg width="'+sz+'" height="'+sz+'" xmlns="http://www.w3.org/2000/svg"><circle cx="'+cx+'" cy="'+cy+'" r="'+(r+4)+'" fill="none" stroke="rgba(200,155,240,0.35)" stroke-width="1.5"/>'+p+'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*0.28)+'" fill="rgba(255,252,255,0.9)" stroke="rgba(200,155,240,0.5)" stroke-width="1.2"/></svg>';
}

RESORTS.forEach(function(resort) {
  var r=20, sz=(r+5)*2;
  // Pie marker
  var pm = L.marker([resort.lat, resort.lng], {
    icon: L.divIcon({html:'<div class="resort-marker">'+pie(resort.f,r)+'</div>', className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]}),
    zIndexOffset:500
  });
  pm.on('click', function(){ showPanel(resort); });
  pm.addTo(map);
  // Label
  L.marker([resort.lat, resort.lng], {
    icon: L.divIcon({html:'<div class="resort-lbl">'+resort.n+(resort.foreign?' 🌍':'')+'</div>', className:'', iconSize:[1,1], iconAnchor:[-(sz/2-2),sz/2]}),
    interactive:false, zIndexOffset:499
  }).addTo(map);
  // Landmark
  var lmSvg = LM[resort.id] || LM['podmoskovye'];
  var lmMk = L.marker([resort.lat, resort.lng], {
    icon: L.divIcon({html:'<div class="lm-icon" onclick="openResort(\''+resort.id+'\')"><div class="lm-box">'+lmSvg+'</div></div>', className:'', iconSize:[60,60], iconAnchor:[30,96]}),
    zIndexOffset:498
  });
  lmMk.addTo(map);
});

// Cities
var CITIES=[[55.7558,37.6176,'Москва',1],[59.9343,30.3351,'Санкт-Петербург',1],[55.0084,82.9357,'Новосибирск',1],[56.8519,60.6122,'Екатеринбург',1],[56.3269,44.0059,'Нижний Новгород',0],[55.8304,49.0661,'Казань',0],[55.1644,61.4368,'Челябинск',0],[48.7194,44.5018,'Волгоград',0],[45.0360,38.9763,'Краснодар',0],[54.7388,55.9721,'Уфа',0],[56.0152,92.8672,'Красноярск',0],[58.0105,56.2502,'Пермь',0],[43.1332,131.9113,'Владивосток',0],[52.2978,104.2964,'Иркутск',0],[51.5723,46.0059,'Саратов',0],[53.3547,83.7697,'Барнаул',0],[54.9885,73.3242,'Омск',0],[68.9585,33.0827,'Мурманск',0],[41.6938,44.8015,'Тбилиси',0],[48.2082,16.3738,'Вена',0],[48.1351,11.5820,'Мюнхен',0],[48.8566,2.3522,'Париж',0],[41.9028,12.4964,'Рим',0]];
var cg={big:[],small:[]};
CITIES.forEach(function(c) {
  var isR=RESORTS.some(function(r){return r.cities.indexOf(c[2])>=0;});
  if(isR)return;
  var big=c[3]===1;
  var dot=L.marker([c[0],c[1]],{icon:L.divIcon({html:'<div class="city-dot'+(big?' big':'')+'"></div>',className:'',iconSize:[big?6:4,big?6:4],iconAnchor:[big?3:2,big?3:2]}),interactive:false,zIndexOffset:300});
  var lbl=L.marker([c[0],c[1]],{icon:L.divIcon({html:'<div class="city-lbl'+(big?' big':'')+'">'+c[2]+'</div>',className:'',iconSize:[1,1],iconAnchor:[-6,8]}),interactive:false,zIndexOffset:301});
  (big?cg.big:cg.small).push({dot:dot,lbl:lbl});
});
function updateVis(){
  var z=map.getZoom();
  cg.big.forEach(function(x){if(z>=4){if(!map.hasLayer(x.dot))x.dot.addTo(map);if(!map.hasLayer(x.lbl))x.lbl.addTo(map);}else{if(map.hasLayer(x.dot))map.removeLayer(x.dot);if(map.hasLayer(x.lbl))map.removeLayer(x.lbl);}});
  cg.small.forEach(function(x){if(z>=6){if(!map.hasLayer(x.dot))x.dot.addTo(map);if(!map.hasLayer(x.lbl))x.lbl.addTo(map);}else{if(map.hasLayer(x.dot))map.removeLayer(x.dot);if(map.hasLayer(x.lbl))map.removeLayer(x.lbl);}});
}
map.on('zoomend',updateVis);
updateVis();

// Panel
var panel=document.getElementById('panel'), pcont=document.getElementById('pcont');
function sf(r){var f=Math.floor(r),h=(r-f)>=0.25?1:0;return'★'.repeat(f)+(h?'½':'')+'☆'.repeat(5-f-h);}

function showPanel(resort) {
  var badges=resort.f.map(function(k){return'<div class="fbd"><div class="fdot" style="background:'+F[k].c+'"></div>'+F[k].n+'</div>';}).join('');
  var sans=resort.sans.map(function(s){return'<div class="sc"><div class="sn">'+s.st+' '+s.n+'</div><div class="sr"><span style="color:#e8a0c0;font-size:11px">'+sf(s.r)+'</span><span class="rat">'+s.r+'</span><span class="src">'+s.src+'</span></div>'+(s.note?'<div class="snote">'+s.note+'</div>':'')+'</div>';}).join('');
  var cl=resort.cities.length>1?'<br><small style="color:#c090d0">Объединяет: '+resort.cities.join(' · ')+'</small>':'';
  var fb=resort.foreign?'<span class="fb-foreign">🌍 Зарубежный</span>':'';
  pcont.innerHTML='<div class="pt">'+resort.fn+fb+cl+'</div><div class="pr">📍 '+resort.reg+'</div><div class="fb">'+badges+'</div><div class="pd">'+resort.desc+'</div><div class="st">Санатории</div>'+sans+'<div class="st">Как добраться</div><div class="hw">✈ '+resort.access+'</div><div style="height:16px"></div>';
  panel.classList.add('open');
  map.dragging.disable();
}
function closePanel(){panel.classList.remove('open');map.dragging.enable();}
document.getElementById('pc').onclick=closePanel;
document.getElementById('ph').onclick=closePanel;
map.on('click',function(){if(panel.classList.contains('open'))closePanel();});

window.openResort=function(id){var r=RESORTS.find(function(x){return x.id===id;});if(r)showPanel(r);};

// Legend
var lt=document.getElementById('ltog'),lb=document.getElementById('lbody'),lo=true;
lt.onclick=function(){lo=!lo;lb.classList.toggle('h',!lo);lt.classList.toggle('c',!lo);};

// Toast
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3200);}
setTimeout(function(){showToast('🌸 Нажмите на иконку или кружок для информации о курорте');},1600);

// Telegram
try{if(window.Telegram&&window.Telegram.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}}catch(e){}
