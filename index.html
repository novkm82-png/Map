<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#fdf6f0}
#app{width:100%;height:100%;position:relative}
.leaflet-tile-container img{filter:saturate(0.28) brightness(1.38) contrast(0.7) sepia(0.1) !important;opacity:0.82 !important}
#map::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at 30% 40%,rgba(220,190,255,0.2) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(255,210,190,0.16) 0%,transparent 55%)}
#map{position:absolute;inset:0;z-index:1}
.leaflet-control-zoom{border:1px solid rgba(180,140,200,0.35)!important;border-radius:10px!important;box-shadow:0 2px 8px rgba(140,100,170,0.15)!important}
.leaflet-control-zoom a{background:rgba(255,252,255,0.93)!important;color:#8a5aaa!important;border:none!important;font-family:'Playfair Display',serif!important;font-weight:700;border-bottom:1px solid rgba(180,140,200,0.2)!important}
.leaflet-control-zoom a:hover{background:rgba(240,228,255,0.97)!important}
.leaflet-control-attribution{background:rgba(255,252,255,0.75)!important;color:#b8a0c8!important;font-size:9px}
#header{position:absolute;top:0;left:0;right:0;z-index:1000;padding:10px 16px 10px;background:linear-gradient(to bottom,rgba(255,250,255,0.96) 60%,rgba(255,250,255,0));pointer-events:none;text-align:center}
#header h1{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;font-weight:700;color:#7a3a9a;letter-spacing:0.5px;text-shadow:0 1px 3px rgba(200,150,230,0.25)}
#header p{font-family:'Lora',serif;font-size:10px;color:#b090c8;letter-spacing:1px;margin-top:1px}
#butterflies{position:absolute;top:0;left:0;right:0;z-index:999;pointer-events:none;height:80px}
.butterfly{position:absolute;animation:flutter 6s ease-in-out infinite;opacity:0.6}
@keyframes flutter{0%,100%{transform:translateY(0) rotate(-5deg)}25%{transform:translateY(-8px) rotate(5deg)}50%{transform:translateY(-3px) rotate(-3deg)}75%{transform:translateY(-10px) rotate(8deg)}}
.city-label{background:none!important;border:none!important;font-family:'Lora',serif;color:#9070a8;font-size:10px;letter-spacing:0.3px;white-space:nowrap;text-shadow:1px 1px 0 rgba(255,250,255,0.95),-1px -1px 0 rgba(255,250,255,0.95),0 0 6px rgba(255,250,255,0.9);pointer-events:none}
.city-label.major{color:#6a4888;font-weight:600}
.city-label.huge{color:#5a3878;font-weight:700}
.city-dot{width:4px;height:4px;background:#c8a0e0;border-radius:50%;border:1px solid rgba(200,160,230,0.4)}
.city-dot.major{width:5px;height:5px;background:#b088c8}
.city-dot.huge{width:7px;height:7px;background:#9068b0;border:1.5px solid rgba(180,130,210,0.5)}
.resort-marker{cursor:pointer!important;filter:drop-shadow(0 3px 8px rgba(150,90,190,0.28));transition:filter 0.2s,transform 0.2s;transform-origin:center;animation:softPulse 4s ease-in-out infinite}
.resort-marker:hover{filter:drop-shadow(0 5px 14px rgba(150,90,190,0.48)) drop-shadow(0 0 16px rgba(210,160,240,0.4));transform:scale(1.14);animation:none}
.resort-label{background:none!important;border:none!important;font-family:'Playfair Display',serif;color:#6a2888;font-size:11px;font-weight:700;font-style:italic;white-space:nowrap;text-shadow:1px 1px 0 rgba(255,252,255,0.95),-1px -1px 0 rgba(255,252,255,0.95),0 0 8px rgba(255,252,255,0.9);pointer-events:none}
.lm-wrap{cursor:pointer;transform-style:preserve-3d;perspective:150px}
.lm-inner{width:64px;height:64px;border-radius:14px;overflow:hidden;border:1.5px solid rgba(200,150,230,0.45);box-shadow:0 4px 16px rgba(140,90,180,0.2);transform:rotateX(10deg) rotateY(-3deg);transition:transform 0.35s ease,box-shadow 0.35s ease;animation:lmFloat 4s ease-in-out infinite}
.lm-wrap:hover .lm-inner{transform:rotateX(0deg) rotateY(0deg) scale(1.14);box-shadow:0 8px 24px rgba(140,90,180,0.38),0 0 20px rgba(210,160,240,0.3);animation:none}
@keyframes lmFloat{0%,100%{transform:rotateX(10deg) rotateY(-3deg) translateY(0)}50%{transform:rotateX(10deg) rotateY(-3deg) translateY(-4px)}}
@keyframes softPulse{0%,100%{opacity:0.88}50%{opacity:1}}
@keyframes steamRise{0%{opacity:0;transform:translateY(0)}50%{opacity:0.7}100%{opacity:0;transform:translateY(-14px)}}
@keyframes flowerSway{0%,100%{transform-origin:bottom center;transform:rotate(-4deg)}50%{transform-origin:bottom center;transform:rotate(4deg)}}
@keyframes snowGlow{0%,100%{opacity:0.8}50%{opacity:1}}
@keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes leafSway{0%,100%{transform-origin:bottom;transform:rotate(-5deg)}50%{transform-origin:bottom;transform:rotate(5deg)}}
@keyframes waterRipple{0%{opacity:0.8}100%{opacity:0;transform:scale(2)}}
#panel{position:absolute;bottom:0;left:0;right:0;z-index:2000;background:linear-gradient(170deg,rgba(255,252,255,0.98),rgba(250,244,255,0.99));border-top:2px solid rgba(200,155,230,0.28);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);max-height:78vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(140,90,180,0.1)}
#panel.open{transform:translateY(0)}
#panel-handle{width:38px;height:4px;background:rgba(200,155,230,0.38);border-radius:2px;margin:10px auto 0;cursor:pointer}
#panel-close{position:absolute;top:10px;right:14px;width:28px;height:28px;background:rgba(200,155,230,0.14);border:1px solid rgba(200,155,230,0.35);border-radius:50%;color:#9a70b8;font-size:15px;line-height:28px;text-align:center;cursor:pointer;transition:background 0.2s}
#panel-close:hover{background:rgba(200,155,230,0.28)}
#panel-content{padding:12px 16px 24px}
#panel-title{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;font-weight:700;color:#6a2888;padding-right:36px;line-height:1.2}
#panel-region{font-family:'Lora',serif;font-size:11px;color:#b090c8;margin:3px 0 10px}
.factor-badges{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.factor-badge{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-family:'Lora',serif;font-size:11px;color:#5a2870;border:1px solid rgba(200,155,230,0.3);background:rgba(255,252,255,0.85)}
.factor-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#panel-desc{font-family:'Lora',serif;font-size:13px;color:#8a60a0;line-height:1.65;margin:10px 0;border-top:1px solid rgba(200,155,230,0.14);border-bottom:1px solid rgba(200,155,230,0.14);padding:10px 0}
.section-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#7a3898;letter-spacing:0.8px;text-transform:uppercase;margin:12px 0 6px;display:flex;align-items:center;gap:5px}
.section-title::before{content:'✿';font-size:11px;color:#c088d8;opacity:0.8}
.san-card{background:linear-gradient(135deg,rgba(255,252,255,0.82),rgba(248,238,255,0.72));border:1px solid rgba(200,155,230,0.2);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.san-name{font-family:'Lora',serif;font-size:12px;font-weight:600;color:#6a3880;line-height:1.3}
.san-stars-row{display:flex;align-items:center;gap:4px;margin-top:3px}
.san-rating{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#9a58b8}
.san-source{font-family:'Lora',serif;font-size:9px;color:#c098d8}
.san-note{font-family:'Lora',serif;font-size:11px;color:#a080b8;margin-top:4px;line-height:1.4}
.how-to{font-family:'Lora',serif;font-size:12px;color:#a080b8;line-height:1.55;padding:8px 12px;background:rgba(200,165,228,0.07);border:1px solid rgba(200,155,230,0.14);border-radius:8px;margin-top:8px}
.foreign-badge{display:inline-block;background:rgba(200,155,230,0.18);border:1px solid rgba(200,155,230,0.38);border-radius:10px;padding:2px 8px;font-family:'Lora',serif;font-size:10px;color:#9a68b8;margin-left:6px}
#legend{position:absolute;bottom:16px;left:12px;z-index:1000;background:rgba(255,252,255,0.94);border:1px solid rgba(200,155,230,0.26);border-radius:12px;padding:8px 10px;box-shadow:0 2px 10px rgba(140,90,180,0.09);max-width:198px}
#legend-toggle{font-family:'Playfair Display',serif;font-size:11px;color:#7a3898;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none}
#legend-toggle::after{content:'▲';font-size:8px;transition:transform 0.2s}
#legend-toggle.collapsed::after{transform:rotate(180deg)}
#legend-body{margin-top:6px}
#legend-body.hidden{display:none}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'Lora',serif;font-size:10px;color:#9a70b8;padding:2px 0}
.legend-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.4)}
#toast{position:absolute;top:68px;left:50%;transform:translateX(-50%) translateY(-16px);z-index:3000;background:rgba(255,252,255,0.96);border:1px solid rgba(200,155,230,0.33);border-radius:20px;padding:7px 16px;font-family:'Lora',serif;font-size:12px;color:#8a58a8;opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;white-space:nowrap;box-shadow:0 2px 12px rgba(140,90,180,0.1)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

const map=L.map('map',{center:[52,50],zoom:4,minZoom:2,maxZoom:14,zoomControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

function pieSVG(factors,r=20){
  const n=factors.length,cx=r+5,cy=r+5,step=2*Math.PI/n;let p='';
  factors.forEach((f,i)=>{
    const a0=i*step-Math.PI/2,a1=(i+1)*step-Math.PI/2;
    const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const laf=step>Math.PI?1:0,col=F[f].color;
    if(n===1){p+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" stroke="white" stroke-width="2"/>`;
    }else{p+=`<path d="M${cx},${cy} L${x0.toFixed(1)},${y0.toFixed(1)} A${r},${r} 0 ${laf},1 ${x1.toFixed(1)},${y1.toFixed(1)} Z" fill="${col}" stroke="white" stroke-width="1.2"/>`;}}
  const sz=(r+5)*2;
  return `<svg width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg"><circle cx="${cx}" cy="${cy}" r="${r+4}" fill="none" stroke="rgba(200,155,240,0.35)" stroke-width="1.5"/>${p}<circle cx="${cx}" cy="${cy}" r="${r*0.28}" fill="rgba(255,252,255,0.9)" stroke="rgba(200,155,240,0.5)" stroke-width="1.2"/></svg>`;
}

RESORTS.forEach(resort=>{
  const r=20,sz=(r+5)*2;
  const pie=L.marker([resort.lat,resort.lng],{icon:L.divIcon({html:`<div class="resort-marker">${pieSVG(resort.factors,r)}</div>`,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]}),zIndexOffset:500});
  pie.on('click',()=>showPanel(resort));pie.addTo(map);
  const lbIcon=L.divIcon({html:`<div class="resort-label">${resort.name}${resort.isForeign?' 🌍':''}</div>`,className:'',iconSize:null,iconAnchor:[-sz/2+2,sz/2]});
  L.marker([resort.lat,resort.lng],{icon:lbIcon,zIndexOffset:499,interactive:false}).addTo(map);
  const lmSVG=LM[resort.id]||LM.podmoskovye;
  const lmMk=L.marker([resort.lat,resort.lng],{icon:L.divIcon({html:`<div class="lm-wrap" onclick="showPanel(window.RESORTS.find(r=>r.id==='${resort.id}'))"><div class="lm-inner">${lmSVG}</div></div>`,className:'',iconSize:[64,64],iconAnchor:[32,100]}),zIndexOffset:498});
  lmMk.addTo(map);
});

const CITIES=[[55.7558,37.6176,'Москва',0],[59.9343,30.3351,'Санкт-Петербург',0],[55.0084,82.9357,'Новосибирск',0],[56.8519,60.6122,'Екатеринбург',0],[56.3269,44.0059,'Нижний Новгород',1],[55.8304,49.0661,'Казань',1],[55.1644,61.4368,'Челябинск',1],[48.7194,44.5018,'Волгоград',1],[45.0360,38.9763,'Краснодар',1],[54.7388,55.9721,'Уфа',1],[56.0152,92.8672,'Красноярск',1],[58.0105,56.2502,'Пермь',1],[43.1332,131.9113,'Владивосток',1],[52.2978,104.2964,'Иркутск',1],[51.5723,46.0059,'Саратов',1],[53.3547,83.7697,'Барнаул',1],[54.9885,73.3242,'Омск',1],[68.9585,33.0827,'Мурманск',2],[61.7890,34.3469,'Петрозаводск',2],[64.5401,40.5433,'Архангельск',2],[62.0354,129.6755,'Якутск',2],[41.6938,44.8015,'Тбилиси',2],[48.2082,16.3738,'Вена',2],[48.1351,11.5820,'Мюнхен',2],[50.0755,14.4378,'Прага',2],[48.6690,19.6990,'Братислава',2],[48.8566,2.3522,'Париж',2],[41.9028,12.4964,'Рим',2],[52.3676,4.9041,'Амстердам',2]];
const cg={0:[],1:[],2:[]};
CITIES.forEach(([lat,lng,name,tier])=>{
  const isR=RESORTS.some(r=>r.cities.some(c=>c===name));if(isR)return;
  const sc=tier===0?'huge':tier===1?'major':'';
  const dot=L.marker([lat,lng],{icon:L.divIcon({html:`<div class="city-dot ${sc}"></div>`,className:'',iconSize:[8,8],iconAnchor:[4,4]}),interactive:false,zIndexOffset:300});
  const lbl=L.marker([lat,lng],{icon:L.divIcon({html:`<div class="city-label ${sc}">${name}</div>`,className:'',iconSize:null,iconAnchor:[-6,8]}),interactive:false,zIndexOffset:301});
  cg[Math.min(tier,2)].push({dot,lbl});
});
function updateVis(){const z=map.getZoom();[[0,3],[1,5],[2,6]].forEach(([t,mz])=>{cg[t].forEach(({dot,lbl})=>{if(z>=mz){if(!map.hasLayer(dot))dot.addTo(map);if(!map.hasLayer(lbl))lbl.addTo(map);}else{if(map.hasLayer(dot))map.removeLayer(dot);if(map.hasLayer(lbl))map.removeLayer(lbl);}});});}
map.on('zoomend',updateVis);updateVis();

const panel=document.getElementById('panel'),pContent=document.getElementById('panel-content');
function sf(r){const f=Math.floor(r),h=(r-f)>=0.25?1:0;return'★'.repeat(f)+(h?'½':'')+'☆'.repeat(5-f-h)}
function showPanel(resort){
  if(!resort)return;
  const badges=resort.factors.map(f=>`<div class="factor-badge"><div class="factor-dot" style="background:${F[f].color}"></div>${F[f].name}</div>`).join('');
  const sans=resort.sanatoriums.map(s=>`<div class="san-card"><div class="san-name">${s.stars} ${s.name}</div><div class="san-stars-row"><span style="color:#e8a0c0;font-size:11px">${sf(s.rating)}</span><span class="san-rating">${s.rating}</span><span class="san-source">${s.ratingSource}</span></div>${s.note?`<div class="san-note">${s.note}</div>`:''}</div>`).join('');
  const cl=resort.cities.length>1?`<br><small style="color:#c090d0">Объединяет: ${resort.cities.join(' · ')}</small>`:'';
  const fb=resort.isForeign?'<span class="foreign-badge">🌍 Зарубежный курорт</span>':'';
  pContent.innerHTML=`<div id="panel-title">${resort.fullName}${fb}${cl}</div><div id="panel-region">📍 ${resort.region}</div><div class="factor-badges">${badges}</div><div id="panel-desc">${resort.description}</div><div class="section-title">Санатории</div>${sans}<div class="section-title">Как добраться</div><div class="how-to">✈ ${resort.access}</div><div style="height:16px"></div>`;
  panel.classList.add('open');map.dragging.disable();
}
function closePanel(){panel.classList.remove('open');map.dragging.enable();}
document.getElementById('panel-close').onclick=closePanel;
document.getElementById('panel-handle').onclick=closePanel;
map.on('click',()=>{if(panel.classList.contains('open'))closePanel();});
const lt=document.getElementById('legend-toggle'),lb=document.getElementById('legend-body');let lo=true;
lt.onclick=()=>{lo=!lo;lb.classList.toggle('hidden',!lo);lt.classList.toggle('collapsed',!lo);};
if(window.Telegram?.WebApp){const tg=window.Telegram.WebApp;tg.ready();tg.expand();}
function showToast(m,d=3200){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
setTimeout(()=>showToast('🌸 Нажмите на иконку или кружок для информации о курорте'),1600);
window.RESORTS=RESORTS;window.showPanel=showPanel;
</script>
