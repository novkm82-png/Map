*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f0eaf8}
#map{position:fixed;inset:0;z-index:1}
.leaflet-tile{filter:saturate(0.48) brightness(1.06) contrast(0.87) sepia(0.06)!important;opacity:0.93!important}
.leaflet-control-zoom{border:none!important;border-radius:12px!important;box-shadow:0 2px 12px rgba(140,90,180,0.2)!important}
.leaflet-control-zoom a{background:rgba(255,250,255,0.92)!important;color:#8a50b8!important;border:none!important;font-weight:700;border-bottom:1px solid rgba(180,140,210,0.2)!important}
.leaflet-control-zoom a:hover{background:rgba(240,228,255,0.97)!important}
.leaflet-control-attribution{background:rgba(255,252,255,0.7)!important;color:#c0a0d8!important;font-size:9px}
#header{position:fixed;top:0;left:0;right:0;z-index:1000;text-align:center;padding:8px 16px 6px;background:linear-gradient(to bottom,rgba(255,250,255,0.95) 60%,transparent);pointer-events:none}
#header h1{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:#7a3a9a}
#header p{font-size:10px;color:#b090c8;letter-spacing:1px;margin-top:1px}
.bf{position:fixed;z-index:999;pointer-events:none;animation:flutter 6s ease-in-out infinite;opacity:0.55}
@keyframes flutter{0%,100%{transform:translateY(0) rotate(-5deg)}25%{transform:translateY(-9px) rotate(5deg)}75%{transform:translateY(-11px) rotate(8deg)}}
.resort-marker{cursor:pointer;filter:drop-shadow(0 3px 10px rgba(150,80,200,0.3));transition:transform 0.2s,filter 0.2s;animation:softpulse 4s ease-in-out infinite}
.resort-marker:hover{transform:scale(1.16);animation:none;filter:drop-shadow(0 5px 16px rgba(150,80,200,0.5))}
@keyframes softpulse{0%,100%{opacity:0.88}50%{opacity:1}}
.resort-lbl{background:none!important;border:none!important;font-family:'Playfair Display',serif;color:#6a2888;font-size:11px;font-weight:700;font-style:italic;white-space:nowrap;text-shadow:1px 1px 0 rgba(255,250,255,0.96),-1px -1px 0 rgba(255,250,255,0.96),0 0 10px rgba(255,250,255,0.9);pointer-events:none}

/* Low-poly icon system */
.lp{opacity:0;transform-origin:50% 100%}
.lm.anim .lp{animation:lpIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.lm.anim .lpb{animation:lpBird 2.2s ease-in-out both}
@keyframes lpIn{
  from{opacity:0;transform:scale(0) rotate(-15deg)}
  65%{transform:scale(1.1) rotate(3deg);opacity:1}
  to{opacity:1;transform:scale(1) rotate(0)}
}
@keyframes lpBird{
  0%{opacity:0;transform:translate(-24px,4px)}
  12%{opacity:1}
  50%{transform:translate(0,-16px)}
  88%{opacity:1}
  100%{opacity:0;transform:translate(26px,4px)}
}
.lm{
  cursor:pointer;
  filter:drop-shadow(0 7px 16px rgba(100,70,160,0.3)) drop-shadow(0 2px 4px rgba(100,70,160,0.15));
  transition:filter 0.3s,transform 0.3s;
}
.lm:hover{
  filter:drop-shadow(0 12px 26px rgba(100,70,160,0.48)) drop-shadow(0 0 22px rgba(200,150,240,0.32));
  transform:translateY(-5px) scale(1.07);
}

.clbl{background:none!important;border:none!important;font-family:'Lora',serif;color:#9070a8;font-size:10px;white-space:nowrap;text-shadow:1px 1px 0 rgba(255,250,255,0.95),-1px -1px 0 rgba(255,250,255,0.95);pointer-events:none}
.clbl.big{color:#5a3878;font-weight:600}
.cdot{width:4px;height:4px;background:#c8a0e0;border-radius:50%}
.cdot.big{width:6px;height:6px;background:#9068b0}

.fbs{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}

.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pd{font-size:13px;color:#8a60a0;line-height:1.65;margin:10px 0;border-top:1px solid rgba(200,155,230,0.14);border-bottom:1px solid rgba(200,155,230,0.14);padding:10px 0}
.st{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;color:#7a3898;letter-spacing:0.8px;text-transform:uppercase;margin:12px 0 6px}
.st::before{content:'✿ ';color:#c088d8}
.sc{background:rgba(248,238,255,0.7);border:1px solid rgba(200,155,230,0.2);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.sc a{text-decoration:none;color:inherit;display:block}
.sc:hover{background:rgba(240,226,255,0.85)}
.sn{font-size:12px;font-weight:600;color:#6a3880;line-height:1.3}
.sr{display:flex;align-items:center;gap:4px;margin-top:3px;font-size:11px}
.rat{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#9a58b8}
.rsrc{font-size:9px;color:#c098d8}
.snote{font-size:11px;color:#a080b8;margin-top:4px;line-height:1.4}
.slink{font-size:10px;color:#9a58b8;margin-top:5px;display:flex;align-items:center;gap:3px}
.slink::before{content:'→';font-size:12px}
.hw{font-size:12px;color:#a080b8;line-height:1.55;padding:8px 12px;background:rgba(200,165,228,0.07);border:1px solid rgba(200,155,230,0.14);border-radius:8px;margin-top:8px}
.fbadge{display:inline-block;background:rgba(200,155,230,0.18);border:1px solid rgba(200,155,230,0.38);border-radius:10px;padding:2px 8px;font-size:10px;color:#9a68b8;margin-left:6px}
#legend{position:fixed;bottom:16px;left:12px;z-index:1000;background:rgba(255,252,255,0.94);border:1px solid rgba(200,155,230,0.26);border-radius:12px;padding:8px 10px;box-shadow:0 2px 10px rgba(140,90,180,0.09);max-width:198px}
#ltog{font-family:'Playfair Display',serif;font-size:11px;color:#7a3898;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none}
#ltog::after{content:'▲';font-size:8px;transition:transform 0.2s}
#ltog.c::after{transform:rotate(180deg)}
#lbody{margin-top:6px}
#lbody.h{display:none}
.li{display:flex;align-items:center;gap:6px;font-size:10px;color:#9a70b8;padding:2px 0}
.lc{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-16px);z-index:3000;background:rgba(255,252,255,0.96);border:1px solid rgba(200,155,230,0.33);border-radius:20px;padding:7px 16px;font-size:12px;color:#8a58a8;opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;white-space:nowrap;box-shadow:0 2px 12px rgba(140,90,180,0.1)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

</head>

// Each element has class="lp" + animation-delay for sequential build
// Bird has class="lpb" - appears last
// SVG transparent background = icon is "part of map"

function lp(d,fill,delay,extra){return '<path d="'+d+'" fill="'+fill+'" class="lp" style="animation-delay:'+delay+'s"'+(extra?' '+extra:'')+'/>';}
function lpe(cx,cy,rx,ry,fill,delay){return '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="'+fill+'" class="lp" style="animation-delay:'+delay+'s"/>';}
function lpr(x,y,w,h,rx,fill,delay,op){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="'+(rx||0)+'" fill="'+fill+'"'+(op?' opacity="'+op+'"':'')+' class="lp" style="animation-delay:'+delay+'s"/>';}
function bird(d){return '<g class="lpb" style="animation-delay:1.6s"><path d="'+d+'" fill="none" stroke="#6070a8" stroke-width="1.8" stroke-linecap="round"/></g>';}

// Shadow + ground base (used by all icons)
function base(gc,d){
  return lpe(36,77,27,3.5,'rgba(0,0,0,0.09)',0)+
    lp('M6,63 L66,59 L60,70 L12,74Z',gc||'#a0b878',0.08)+
    lp('M6,63 L66,59 L66,63 L6,67Z','#b8cc90',0.1);
}

// Mountain facets (isometric: left face darker, right lighter, snow on top)
function mtn(px,py,w,lc,rc,d){
  var bw=w/2;
  return lp('M'+(px-bw)+','+(py+30)+' L'+px+','+py+' L'+(px-bw/2)+','+(py+30)+'Z',lc,d)+
    lp('M'+px+','+py+' L'+(px+bw)+','+(py+30)+' L'+(px-bw/2)+','+(py+30)+'Z',rc,d+0.05)+
    lp('M'+(px-4)+','+(py+9)+' L'+px+','+(py-2)+' L'+(px+4)+','+(py+9)+'Z','#f0f4ff',d+0.3,' opacity="0.9"');
}

// Building (isometric box)
function bldg(x,y,w,h,fc,sc,rc,d){
  return lp('M'+x+','+(y+h)+' L'+x+','+y+' L'+(x+w)+','+y+' L'+(x+w)+','+(y+h)+'Z',fc,d)+
    lp('M'+(x+w)+','+y+' L'+(x+w+8)+','+(y-6)+' L'+(x+w+8)+','+(y+h-6)+' L'+(x+w)+','+(y+h)+'Z',sc,d+0.02)+
    lp('M'+x+','+y+' L'+(x+6)+','+(y-6)+' L'+(x+w+6)+','+(y-6)+' L'+(x+w)+','+y+'Z',rc,d+0.04);
}

// ═══ КАРТА ═══
var map=L.map('map',{center:[48,30],zoom:3,minZoom:2,maxZoom:14,zoomControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

function pie(factors,r){
  r=r||20;var n=factors.length,cx=r+5,cy=r+5,step=2*Math.PI/n,p='';
  for(var i=0;i<n;i++){
    var a0=i*step-Math.PI/2,a1=(i+1)*step-Math.PI/2;
    var x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    var laf=step>Math.PI?1:0,col=F[factors[i]].c;
    if(n===1)p+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+col+'" stroke="white" stroke-width="2"/>';
    else p+='<path d="M'+cx+','+cy+' L'+x0.toFixed(1)+','+y0.toFixed(1)+' A'+r+','+r+' 0 '+laf+',1 '+x1.toFixed(1)+','+y1.toFixed(1)+' Z" fill="'+col+'" stroke="white" stroke-width="1.2"/>';
  }
  var sz=(r+5)*2;
  return '<svg width="'+sz+'" height="'+sz+'" xmlns="http://www.w3.org/2000/svg"><circle cx="'+cx+'" cy="'+cy+'" r="'+(r+4)+'" fill="none" stroke="rgba(200,155,240,0.35)" stroke-width="1.5"/>'+p+'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*0.28)+'" fill="rgba(255,252,255,0.9)" stroke="rgba(200,155,240,0.5)" stroke-width="1.2"/></svg>';
}

// Create markers
RESORTS.forEach(function(resort){
  var r=20,sz=(r+5)*2;
  // Pie marker
  var pm=L.marker([resort.lat,resort.lng],{
    icon:L.divIcon({html:'<div class="resort-marker">'+pie(resort.f,r)+'</div>',className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]}),
    zIndexOffset:500
  });
  pm.on('click',function(){showPanel(resort);});
  pm.addTo(map);
  // Label
  L.marker([resort.lat,resort.lng],{
    icon:L.divIcon({html:'<div class="resort-lbl">'+resort.n+(resort.foreign?' 🌍':'')+'</div>',className:'',iconSize:[1,1],iconAnchor:[-(sz/2-2),sz/2]}),
    interactive:false,zIndexOffset:499
  }).addTo(map);
  // Low-poly 3D icon
  var iconKey=ICON_MAP[resort.id]||'mountain_generic';
  var iconSvg=ICONS[iconKey]||ICONS['mountain_generic'];
  L.marker([resort.lat,resort.lng],{
    icon:L.divIcon({
      html:'<div class="lm" id="lm_'+resort.id+'" onclick="openR(\''+resort.id+'\')" title="'+resort.fn+'">'+iconSvg+'</div>',
      className:'',iconSize:[72,80],iconAnchor:[36,112]
    }),
    zIndexOffset:498
  }).addTo(map);
});

];
var cg={big:[],sm:[]};
CITIES.forEach(function(c){
  var isR=RESORTS.some(function(r){return r.cities.indexOf(c[2])>=0;});
  if(isR)return;
  var big=c[3]===1;
  var dot=L.marker([c[0],c[1]],{icon:L.divIcon({html:'<div class="cdot'+(big?' big':'')+'"></div>',className:'',iconSize:[big?6:4,big?6:4],iconAnchor:[big?3:2,big?3:2]}),interactive:false,zIndexOffset:300});
  var lbl=L.marker([c[0],c[1]],{icon:L.divIcon({html:'<div class="clbl'+(big?' big':'')+'">'+c[2]+'</div>',className:'',iconSize:[1,1],iconAnchor:[-6,8]}),interactive:false,zIndexOffset:301});
  (big?cg.big:cg.sm).push({d:dot,l:lbl});
});
function uv(){
  var z=map.getZoom();
  cg.big.forEach(function(x){if(z>=3){if(!map.hasLayer(x.d))x.d.addTo(map);if(!map.hasLayer(x.l))x.l.addTo(map);}else{if(map.hasLayer(x.d))map.removeLayer(x.d);if(map.hasLayer(x.l))map.removeLayer(x.l);}});
  cg.sm.forEach(function(x){if(z>=5){if(!map.hasLayer(x.d))x.d.addTo(map);if(!map.hasLayer(x.l))x.l.addTo(map);}else{if(map.hasLayer(x.d))map.removeLayer(x.d);if(map.hasLayer(x.l))map.removeLayer(x.l);}});
}
map.on('zoomend',uv);uv();

// ═══ ANIMATION TRIGGERS ═══
function playAnim(el){
  if(!el)return;
  el.classList.remove('anim');
  void el.offsetWidth;
  el.classList.add('anim');
}
// Auto-play on load
setTimeout(function(){
  document.querySelectorAll('.lm').forEach(function(e){e.classList.add('anim');});
},400);
// Re-play on hover
document.addEventListener('pointerover',function(e){
  var lm=e.target.closest('.lm');
  if(lm)playAnim(lm);
});

// ═══ PANEL ═══
var panel=document.getElementById('panel'),pcont=document.getElementById('pcont');
function sf(r){var f=Math.floor(r),h=(r-f)>=0.25?1:0;return'★'.repeat(f)+(h?'½':'')+'☆'.repeat(5-f-h);}
function showPanel(resort){
  var badges=resort.f.map(function(k){return'<div class="fbd"><div class="fdot" style="background:'+F[k].c+'"></div>'+F[k].n+'</div>';}).join('');
  var sans=resort.sans.map(function(s){
    var linkHtml=s.link?'<div class="slink">'+
      (resort.foreign?'Открыть на Google Maps':'Открыть на Яндекс Картах')+
    '</div>':'';
    return '<div class="sc"'+(s.link?' onclick="window.open(\''+s.link+'\',\'_blank\')"':'')+'>'+
      '<div class="sn">'+s.st+' '+s.n+'</div>'+
      '<div class="sr"><span style="color:#e8a0c0;font-size:11px">'+sf(s.r)+'</span>'+
      '<span class="rat">'+s.r+'</span><span class="rsrc">'+s.src+'</span></div>'+
      (s.note?'<div class="snote">'+s.note+'</div>':'')+
      linkHtml+'</div>';
  }).join('');
  var cl=resort.cities&&resort.cities.length>1?'<br><small style="color:#c090d0">Объединяет: '+resort.cities.join(' · ')+'</small>':'';
  var fb=resort.foreign?'<span class="fbadge">🌍 Зарубежный</span>':'';
  pcont.innerHTML='<div class="pt">'+resort.fn+fb+cl+'</div>'+
    '<div class="pr">📍 '+resort.reg+'</div>'+
    '<div class="fbs">'+badges+'</div>'+
    '<div class="pd">'+resort.desc+'</div>'+
    '<div class="st">Санатории</div>'+sans+
    '<div class="st">Как добраться</div>'+
    '<div class="hw">✈ '+resort.access+'</div>'+
    '<div style="height:16px"></div>';
  panel.classList.add('open');map.dragging.disable();
  // Play animation for this resort's icon
  var lmEl=document.getElementById('lm_'+resort.id);
  if(lmEl)playAnim(lmEl);
}
function closePanel(){panel.classList.remove('open');map.dragging.enable();}
document.getElementById('pc').onclick=closePanel;
document.getElementById('ph').onclick=closePanel;
map.on('click',function(){if(panel.classList.contains('open'))closePanel();});
window.openR=function(id){var r=RESORTS.find(function(x){return x.id===id;});if(r)showPanel(r);};

// Legend
var lt=document.getElementById('ltog'),lb=document.getElementById('lbody'),lo=true;
lt.onclick=function(){lo=!lo;lb.classList.toggle('h',!lo);lt.classList.toggle('c',!lo);};

// Toast
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3500);}
setTimeout(function(){showToast('🌸 Нажмите на иконку или кружок — информация о курорте и ссылки');},1800);

try{if(window.Telegram&&window.Telegram.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}}catch(e){}
