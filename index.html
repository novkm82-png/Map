<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Курорты России</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f5efe6}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative}

/* ── Watercolour map tiles ── */
.leaflet-tile-container img{
  filter:saturate(0.52) brightness(1.22) contrast(0.78) sepia(0.18) hue-rotate(8deg) !important;
}
#map{position:absolute;inset:0;z-index:1}
.leaflet-control-zoom{border:1px solid rgba(150,120,80,0.35)!important;border-radius:8px!important;box-shadow:0 2px 10px rgba(100,70,40,0.18)!important}
.leaflet-control-zoom a{background:rgba(255,252,245,0.93)!important;color:#7c6040!important;border:none!important;font-family:'Playfair Display',serif!important;font-weight:700;border-bottom:1px solid rgba(150,120,80,0.2)!important}
.leaflet-control-zoom a:hover{background:rgba(240,232,218,0.97)!important}
.leaflet-control-attribution{background:rgba(255,252,248,0.8)!important;color:#a89070!important;font-size:9px;border-radius:4px 0 0 0!important}
.leaflet-control-attribution a{color:#9a7858!important}

/* ── Header ── */
#header{
  position:absolute;top:0;left:0;right:0;z-index:1000;
  padding:10px 14px 8px;
  background:linear-gradient(to bottom,rgba(245,239,230,0.97) 65%,rgba(245,239,230,0));
  pointer-events:none;
}
#header h1{
  font-family:'Playfair Display',serif;font-size:18px;font-style:italic;font-weight:700;
  color:#6b4e2a;letter-spacing:1.5px;
  text-shadow:0 1px 3px rgba(200,160,100,0.3);
}
#header p{font-family:'Lora',serif;font-size:11px;color:#9a7858;letter-spacing:0.5px;margin-top:1px}

/* ── City labels ── */
.city-label{
  background:none!important;border:none!important;
  font-family:'Lora',serif;
  color:#7a5c3c;
  font-size:10px;letter-spacing:0.3px;white-space:nowrap;
  text-shadow:1px 1px 0 rgba(245,235,220,0.9),-1px -1px 0 rgba(245,235,220,0.9),0 1px 4px rgba(245,235,220,1);
  pointer-events:none;
}
.city-label.major{color:#5a4030;font-weight:600;font-size:10px}
.city-label.huge{color:#3d2a18;font-weight:600;font-size:10px;letter-spacing:0.8px}
.city-dot{width:4px;height:4px;background:#b89870;border-radius:50%;border:1px solid rgba(180,150,100,0.4)}
.city-dot.major{width:5px;height:5px;background:#9a7858}
.city-dot.huge{width:7px;height:7px;background:#7a5c40;border:1.5px solid rgba(180,140,80,0.5)}

/* ── Resort pie marker ── */
.resort-marker{cursor:pointer!important;filter:drop-shadow(0 3px 8px rgba(100,70,40,0.35)) drop-shadow(0 0 10px rgba(180,140,80,0.2));transition:filter 0.2s,transform 0.2s;transform-origin:center}
.resort-marker:hover{filter:drop-shadow(0 5px 12px rgba(100,70,40,0.5)) drop-shadow(0 0 18px rgba(200,160,80,0.45));transform:scale(1.12)}
.resort-label{background:none!important;border:none!important;font-family:'Playfair Display',serif;color:#4a3420;font-size:11px;font-weight:700;font-style:italic;white-space:nowrap;text-shadow:1px 1px 0 rgba(245,235,220,0.95),-1px -1px 0 rgba(245,235,220,0.95),0 0 8px rgba(245,235,220,0.8);pointer-events:none;letter-spacing:0.5px}

/* ── City 3-D animation markers ── */
.anim-wrap{
  width:72px;height:72px;cursor:pointer;
  perspective:140px;
}
.anim-inner{
  width:72px;height:72px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(80,55,30,0.28),0 2px 6px rgba(80,55,30,0.15);
  border:2px solid rgba(220,190,130,0.55);
  background:rgba(255,252,246,0.12);
  backdrop-filter:blur(1px);
  transform:rotateX(12deg);
  transform-style:preserve-3d;
}
.anim-inner svg{width:72px;height:72px;display:block}

/* ── Info panel ── */
#panel{
  position:absolute;bottom:0;left:0;right:0;z-index:2000;
  background:rgba(254,251,246,0.98);
  border-top:2px solid rgba(180,145,90,0.3);
  border-radius:18px 18px 0 0;
  transform:translateY(100%);
  transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
  max-height:78vh;overflow-y:auto;
  box-shadow:0 -4px 24px rgba(120,80,40,0.12);
}
#panel.open{transform:translateY(0)}
#panel-handle{width:38px;height:4px;background:rgba(180,145,90,0.35);border-radius:2px;margin:10px auto 0;cursor:pointer}
#panel-close{position:absolute;top:10px;right:14px;width:28px;height:28px;background:rgba(180,145,90,0.12);border:1px solid rgba(180,145,90,0.3);border-radius:50%;color:#9a7858;font-size:15px;line-height:28px;text-align:center;cursor:pointer;transition:background 0.2s}
#panel-close:hover{background:rgba(180,145,90,0.25)}
#panel-content{padding:12px 16px 24px}
#panel-title{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;font-weight:700;color:#4a3420;padding-right:36px;line-height:1.2}
#panel-region{font-family:'Lora',serif;font-size:11px;color:#9a7858;margin:3px 0 10px;letter-spacing:0.3px}
.factor-badges{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.factor-badge{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:16px;font-family:'Lora',serif;font-size:11px;color:#fff;border:1px solid rgba(255,255,255,0.2);text-shadow:0 1px 2px rgba(0,0,0,0.4)}
.factor-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#panel-desc{font-family:'Lora',serif;font-size:13px;color:#7a5c3c;line-height:1.65;margin:10px 0;border-top:1px solid rgba(180,145,90,0.15);border-bottom:1px solid rgba(180,145,90,0.15);padding:10px 0}
.section-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#6b4e2a;letter-spacing:0.8px;text-transform:uppercase;margin:12px 0 6px;display:flex;align-items:center;gap:5px}
.section-title::before{content:'✦';font-size:9px;color:#c4a268;opacity:0.7}

/* ── Sanatorium card ── */
.san-card{
  background:linear-gradient(135deg,rgba(255,252,246,0.8),rgba(248,240,225,0.6));
  border:1px solid rgba(180,145,90,0.2);
  border-radius:10px;padding:10px 12px;margin-bottom:7px;
  cursor:pointer;transition:background 0.2s,box-shadow 0.2s;
}
.san-card:hover{background:linear-gradient(135deg,rgba(250,240,220,0.9),rgba(240,225,200,0.8));box-shadow:0 2px 8px rgba(180,145,90,0.15)}
.san-card:active{background:rgba(240,225,200,0.95)}
.san-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.san-name{font-family:'Lora',serif;font-size:12px;font-weight:600;color:#5a4030;line-height:1.3}
.san-stars-row{display:flex;align-items:center;gap:4px;margin-top:3px}
.san-stars{font-size:11px;letter-spacing:1px}
.san-rating{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#8a6a2a;margin-left:2px}
.san-source{font-family:'Lora',serif;font-size:9px;color:#b8a080;margin-left:4px}
.san-note{font-family:'Lora',serif;font-size:11px;color:#9a8060;margin-top:4px;line-height:1.4}
.san-tap-hint{font-family:'Lora',serif;font-size:10px;color:#b8a080;font-style:italic;margin-top:4px}
.reviews-block{margin-top:8px;padding-top:8px;border-top:1px solid rgba(180,145,90,0.15);display:none}
.reviews-block.open{display:block}
.review-item{background:rgba(248,243,234,0.7);border-radius:7px;padding:8px 10px;margin-bottom:6px;font-family:'Lora',serif;font-size:11px;color:#7a5c3c;line-height:1.5}
.review-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.review-author{font-weight:600;color:#5a4030}
.review-date{color:#b8a080;font-size:10px}
.review-stars{font-size:11px}
.review-text{color:#7a5c3c}
.reviews-loading{font-family:'Lora',serif;font-size:11px;color:#9a7858;font-style:italic;padding:6px 0;text-align:center}

.how-to{font-family:'Lora',serif;font-size:12px;color:#9a8060;line-height:1.55;padding:8px 12px;background:rgba(200,175,120,0.08);border:1px solid rgba(180,145,90,0.15);border-radius:8px;margin-top:8px}
.climate-info{font-family:'Lora',serif;font-size:12px;color:#9a8060;line-height:1.55;padding:8px 12px;background:rgba(130,180,200,0.08);border:1px solid rgba(130,180,200,0.2);border-radius:8px;margin-top:8px}

/* ── Legend ── */
#legend{position:absolute;bottom:16px;left:12px;z-index:1000;background:rgba(254,251,246,0.93);border:1px solid rgba(180,145,90,0.25);border-radius:10px;padding:8px 10px;box-shadow:0 2px 10px rgba(120,80,40,0.1);max-width:185px}
#legend-toggle{font-family:'Playfair Display',serif;font-size:11px;color:#6b4e2a;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none}
#legend-toggle::after{content:'▲';font-size:8px;transition:transform 0.2s}
#legend-toggle.collapsed::after{transform:rotate(180deg)}
#legend-body{margin-top:6px}
#legend-body.hidden{display:none}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'Lora',serif;font-size:10px;color:#8a6a40;padding:2px 0}
.legend-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.3)}

/* ── Toast ── */
#toast{position:absolute;top:68px;left:50%;transform:translateX(-50%) translateY(-16px);z-index:3000;background:rgba(254,251,246,0.96);border:1px solid rgba(180,145,90,0.3);border-radius:20px;padding:7px 16px;font-family:'Lora',serif;font-size:12px;color:#7a5c3c;letter-spacing:0.3px;opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;white-space:nowrap;box-shadow:0 2px 12px rgba(120,80,40,0.12)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Animation keyframes ── */
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes waveSway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes steamRise{0%{opacity:0;transform:translateY(0) scaleX(1)}40%{opacity:0.7}100%{opacity:0;transform:translateY(-14px) scaleX(1.5)}}
@keyframes shimmer{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes ripple{0%{r:3;opacity:0.8}100%{r:10;opacity:0}}
@keyframes pulse3d{0%,100%{transform:rotateX(12deg) scale(1)}50%{transform:rotateX(12deg) scale(1.04)}}
@keyframes waterFlow{0%{stroke-dashoffset:30}100%{stroke-dashoffset:0}}
@keyframes birdFly{0%{transform:translateX(0) translateY(0)}50%{transform:translateX(6px) translateY(-3px)}100%{transform:translateX(12px) translateY(0)}}
@keyframes sunGlow{0%,100%{opacity:0.7}50%{opacity:1}}
@keyframes leafSway{0%,100%{transform-origin:bottom center;transform:rotate(-4deg)}50%{transform-origin:bottom center;transform:rotate(4deg)}}
@keyframes petal{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes snowCap{0%,100%{opacity:0.85}50%{opacity:1}}
.anim-inner:hover{animation:pulse3d 2s ease-in-out infinite}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>Курорты России</h1>
    <p>Интерактивная карта санаторно-курортных зон</p>
  </div>
  <div id="map"></div>
  <div id="legend">
    <div id="legend-toggle">Природные факторы</div>
    <div id="legend-body">
      <div class="legend-item"><div class="legend-color" style="background:#9B59B6"></div>Радоновые воды</div>
      <div class="legend-item"><div class="legend-color" style="background:#E6B800"></div>Сероводородные воды</div>
      <div class="legend-item"><div class="legend-color" style="background:#2E86C1"></div>Хлоридно-натриевые воды</div>
      <div class="legend-item"><div class="legend-color" style="background:#E91E63"></div>Йодобромные воды</div>
      <div class="legend-item"><div class="legend-color" style="background:#27AE60"></div>Углекислые воды</div>
      <div class="legend-item"><div class="legend-color" style="background:#8B6914"></div>Грязелечение</div>
    </div>
  </div>
  <div id="panel">
    <div id="panel-handle"></div>
    <div id="panel-close">✕</div>
    <div id="panel-content"></div>
  </div>
  <div id="toast"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═══════════════════════════════════════════════
// ПРИРОДНЫЕ ФАКТОРЫ
// ═══════════════════════════════════════════════
const FACTORS={
  radon:   {name:'Радоновые воды',     color:'#9B59B6'},
  sulfide: {name:'Сероводородные воды',color:'#E6B800'},
  chloride:{name:'Хлоридно-натриевые воды',color:'#2E86C1'},
  iodine:  {name:'Йодобромные воды',   color:'#E91E63'},
  carbonic:{name:'Углекислые воды',    color:'#27AE60'},
  mud:     {name:'Грязелечение',       color:'#8B6914'}
};

// ═══════════════════════════════════════════════
// 3D-АНИМАЦИИ ДЛЯ ГОРОДОВ-КУРОРТОВ
// ═══════════════════════════════════════════════
const RESORT_ANIM={
  /* КМВ — двуглавый Эльбрус + нарзановый источник */
  kmv:`<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="sky_kmv" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c8e8f5"/><stop offset="100%" stop-color="#e8f5d8"/></linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d0e2ee"/><stop offset="100%" stop-color="#8aacca"/></linearGradient></defs>
    <circle cx="36" cy="36" r="36" fill="url(#sky_kmv)"/>
    <path d="M4,52 L18,26 L24,34 L30,18 L36,28 L42,18 L48,30 L54,22 L68,52Z" fill="url(#mtn)"/>
    <path d="M24,34 L30,20 L36,30 L42,20 L48,32" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9" style="animation:snowCap 3s ease-in-out infinite"/>
    <path d="M14,52 L28,30 L30,34 L32,26 L36,34 L40,26 L42,34 L44,28 L58,52Z" fill="#b8d4e8" opacity="0.35"/>
    <ellipse cx="36" cy="60" rx="10" ry="4" fill="#5abadf" opacity="0.75"/>
    <path d="M30,60 Q33,56 36,60 Q39,56 42,60" fill="none" stroke="#5abadf" stroke-width="1.8" style="animation:waveSway 2s ease-in-out infinite"/>
    <circle cx="34" cy="57" r="2" fill="rgba(120,210,240,0.55)" style="animation:steamRise 2.2s ease-in-out infinite"/>
    <circle cx="38" cy="55" r="1.5" fill="rgba(120,210,240,0.45)" style="animation:steamRise 2.2s ease-in-out infinite;animation-delay:0.7s"/>
  </svg>`,

  /* Белокуриха — алтайские сосны + радоновый туман */
  belokurikha:`<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="sky_bk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dce8f8"/><stop offset="100%" stop-color="#c8d8e8"/></linearGradient></defs>
    <circle cx="36" cy="36" r="36" fill="url(#sky_bk)"/>
    <path d="M5,58 L20,30 L35,58Z" fill="#4a7c50" opacity="0.85"/>
    <path d="M20,58 L35,26 L50,58Z" fill="#386640" opacity="0.9"/>
    <path d="M40,58 L52,32 L64,58Z" fill="#4a7c50" opacity="0.8"/>
    <path d="M12,58 L22,38 L32,58Z" fill="#5a9060" opacity="0.7"/>
    <path d="M36,60 Q26,56 16,62 Q26,58 36,62 Q46,58 56,62 Q46,56 36,60Z" fill="rgba(180,150,220,0.35)" style="animation:waveSway 3s ease-in-out infinite"/>
    <ellipse cx="36" cy="62" rx="18" ry="5" fill="rgba(160,130,210,0.2)"/>
    <path d="M26,20 Q32,14 38,18 Q32,16 26,20Z" fill="white" opacity="0.6" style="animation:snowCap 4s ease-in-out infinite"/>
  </svg>`,

  /* Сочи — пальма + морская волна + закат */
  sochi:`<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="sea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ec8f0"/><stop offset="100%" stop-color="#1a8cba"/></linearGradient>
    <linearGradient id="sky_s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd080"/><stop offset="60%" stop-color="#ffb060"/><stop offset="100%" stop-color="#4ec8f0"/></linearGradient></defs>
    <circle cx="36" cy="36" r="36" fill="url(#sky_s)"/>
    <ellipse cx="56" cy="20" rx="9" ry="9" fill="#ffdd60" opacity="0.9" style="animation:sunGlow 3s ease-in-out infinite"/>
    <ellipse cx="56" cy="20" rx="13" ry="13" fill="rgba(255,210,60,0.2)" style="animation:sunGlow 3s ease-in-out infinite;animation-delay:0.5s"/>
    <rect x="0" y="44" width="72" height="28" fill="url(#sea)" rx="0"/>
    <path d="M0,47 Q12,43 24,47 Q36,51 48,47 Q60,43 72,47 L72,50 Q60,46 48,50 Q36,54 24,50 Q12,46 0,50Z" fill="rgba(255,255,255,0.5)" style="animation:waterFlow 2s linear infinite;stroke-dasharray:60;stroke-dashoffset:60"/>
    <path d="M30,44 L32,18 Q32,14 34,12 Q36,10 38,12 Q40,14 40,18 L40,44" fill="#5a8c40" opacity="0.85"/>
    <path d="M34,14 Q28,10 20,16 Q28,12 36,18Z" fill="#7ab850" style="animation:leafSway 2.5s ease-in-out infinite"/>
    <path d="M36,16 Q44,8 52,14 Q44,10 38,18Z" fill="#7ab850" style="animation:leafSway 2.5s ease-in-out infinite;animation-delay:0.4s"/>
    <path d="M34,18 Q24,18 18,24 Q26,18 36,22Z" fill="#6aac44" style="animation:leafSway 2s ease-in-out infinite;animation-delay:0.8s"/>
  </svg>`,

  /* Горячий Ключ — термальный источник + ели */
  gorkey:`<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="pool" cx="50%" cy="50%"><stop offset="0%" stop-color="#7de0d8"/><stop offset="100%" stop-color="#3ab8b0"/></radialGradient></defs>
    <circle cx="36" cy="36" r="36" fill="#e8f5ee"/>
    <path d="M4,60 L16,34 L28,60Z" fill="#3d6e48" opacity="0.9"/>
    <path d="M18,60 L30,28 L42,60Z" fill="#2e5a3a" opacity="0.95"/>
    <path d="M44,60 L54,36 L64,60Z" fill="#3d6e48" opacity="0.85"/>
    <ellipse cx="36" cy="58" rx="12" ry="6" fill="url(#pool)"/>
    <circle cx="32" cy="55" r="1.8" fill="rgba(200,240,235,0.7)" style="animation:steamRise 1.8s ease-in-out infinite"/>
    <circle cx="36" cy="52" r="2.2" fill="rgba(200,240,235,0.65)" style="animation:steamRise 1.8s ease-in-out infinite;animation-delay:0.5s"/>
    <circle cx="40" cy="54" r="1.6" fill="rgba(200,240,235,0.6)" style="animation:steamRise 1.8s ease-in-out infinite;animation-delay:1s"/>
    <circle cx="30" cy="50" r="1.5" fill="rgba(200,240,235,0.55)" style="animation:steamRise 2.2s ease-in-out infinite;animation-delay:0.3s"/>
    <circle cx="42" cy="50" r="1.3" fill="rgba(200,240,235,0.5)" style="animation:steamRise 2s ease-in-out infinite;animation-delay:0.8s"/>
  </svg>`,

  /* Анапа — волна + чайка + пляж */
  anapa:`<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="sky_a" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87d0f0"/><stop offset="100%" stop-color="#c8ecf8"/></linearGradient>
    <linearGradient id="sea_a" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#30b0e0"/><stop offset="100%" stop-color="#1880b8"/></linearGradient></defs>
    <circle cx="36" cy="36" r="36" fill="url(#sky_a)"/>
    <ellipse cx="20" cy="18" rx="8" ry="5" fill="white" opacity="0.7"/>

// ── PIE SVG ──
function pieSVG(factors,r=22){
  const n=factors.length,cx=r+4,cy=r+4,step=2*Math.PI/n;
  let p='';
  factors.forEach((f,i)=>{
    const a0=i*step-Math.PI/2,a1=(i+1)*step-Math.PI/2;
    const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const laf=step>Math.PI?1:0;
    const col=FACTORS[f].color;
    if(n===1){p+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" stroke="#fff" stroke-width="2"/>`;
    }else{p+=`<path d="M${cx},${cy} L${x0.toFixed(1)},${y0.toFixed(1)} A${r},${r} 0 ${laf},1 ${x1.toFixed(1)},${y1.toFixed(1)} Z" fill="${col}" stroke="#fff" stroke-width="1.2"/>`;}
  });
  const sz=(r+4)*2;
  return `<svg width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r+3}" fill="none" stroke="rgba(200,170,100,0.35)" stroke-width="1.5"/>
    ${p}
    <circle cx="${cx}" cy="${cy}" r="${r*0.3}" fill="rgba(255,252,246,0.85)" stroke="rgba(200,170,100,0.5)" stroke-width="1.2"/>
    <circle cx="${cx-r*0.28}" cy="${cy-r*0.28}" r="${r*0.18}" fill="rgba(255,255,255,0.18)"/>
  </svg>`;
}

const resortLayer={};
RESORTS.forEach(resort=>{
  const r=22,sz=(r+4)*2;
  const pieIcon=L.divIcon({html:`<div class="resort-marker">${pieSVG(resort.factors,r)}</div>`,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
  const pieMarker=L.marker([resort.lat,resort.lng],{icon:pieIcon,zIndexOffset:500});
  pieMarker.on('click',()=>showPanel(resort));
  pieMarker.addTo(map);

  const labelIcon=L.divIcon({html:`<div class="resort-label">${resort.name}</div>`,className:'',iconSize:null,iconAnchor:[-sz/2+2,sz/2]});
  L.marker([resort.lat,resort.lng],{icon:labelIcon,zIndexOffset:499,interactive:false}).addTo(map);

  // 3D city animation
  const animHTML=RESORT_ANIM[resort.id]||'';
  if(animHTML){
    const animIcon=L.divIcon({
      html:`<div class="anim-wrap"><div class="anim-inner">${animHTML}</div></div>`,
      className:'',iconSize:[72,72],iconAnchor:[36,108]
    });
    const animMk=L.marker([resort.lat,resort.lng],{icon:animIcon,zIndexOffset:498,interactive:false});

});

// ── ГОРОДА ──
const cityGroups={0:[],1:[],2:[]};
CITIES.forEach(([lat,lng,name,tier])=>{
  const isResort=RESORTS.some(r=>r.cities.some(c=>c.toLowerCase()===name.toLowerCase()));
  if(isResort)return;
  const sc=tier===0?'huge':tier===1?'major':'';
  const dot=L.marker([lat,lng],{icon:L.divIcon({html:`<div class="city-dot ${sc}"></div>`,className:'',iconSize:[8,8],iconAnchor:[4,4]}),interactive:false,zIndexOffset:tier===0?400:300});
  const lbl=L.marker([lat,lng],{icon:L.divIcon({html:`<div class="city-label ${sc}">${name}</div>`,className:'',iconSize:null,iconAnchor:[-6,8]}),interactive:false,zIndexOffset:tier===0?401:301});
  cityGroups[Math.min(tier,2)].push({dot,lbl});
});

function updateVisibility(){
  const z=map.getZoom();
  [[0,4],[1,5],[2,6]].forEach(([tier,minZ])=>{
    cityGroups[tier].forEach(({dot,lbl})=>{
      if(z>=minZ){if(!map.hasLayer(dot))dot.addTo(map);if(!map.hasLayer(lbl))lbl.addTo(map);}
      else{if(map.hasLayer(dot))map.removeLayer(dot);if(map.hasLayer(lbl))map.removeLayer(lbl);}
    });
  });
  // city animations
  Object.entries(resortLayer).forEach(([id,{anim}])=>{
    if(z>=6){if(!map.hasLayer(anim))anim.addTo(map);}
    else{if(map.hasLayer(anim))map.removeLayer(anim);}
  });
}
map.on('zoomend',updateVisibility);
updateVisibility();

const panel=document.getElementById('panel');
const panelContent=document.getElementById('panel-content');

function starFill(rating){
  const full=Math.floor(rating),half=(rating-full)>=0.25?1:0;
  const empty=5-full-half;
  return '★'.repeat(full)+(half?'½':'')+('☆'.repeat(empty));
}

function showPanel(resort){
  const badges=resort.factors.map(f=>`
    <div class="factor-badge" style="background:${FACTORS[f].color}cc">
      <div class="factor-dot" style="background:${FACTORS[f].color}"></div>${FACTORS[f].name}
    </div>`).join('');

  const sanList=resort.sanatoriums.map((s,i)=>`
    <div class="san-card" onclick="toggleReviews('${resort.id}_${i}','${encodeURIComponent(s.name)}','${encodeURIComponent(resort.description)}')">
      <div class="san-header">
        <div class="san-name">${s.stars} ${s.name}</div>
      </div>
      <div class="san-stars-row">
        <span class="san-stars" style="color:#e8a820">${starFill(s.rating)}</span>
        <span class="san-rating">${s.rating}</span>
        <span class="san-source">${s.ratingSource}</span>
      </div>
      ${s.note?`<div class="san-note">${s.note}</div>`:''}
      <div class="san-tap-hint">👆 Нажмите для отзывов</div>
      <div class="reviews-block" id="rev_${resort.id}_${i}"></div>
    </div>`).join('');

  const citiesLine=resort.cities.length>1?`<br><small style="color:#b8a080">Объединяет: ${resort.cities.join(' · ')}</small>`:'';

  panelContent.innerHTML=`
    <div id="panel-title">${resort.fullName}${citiesLine}</div>
    <div id="panel-region">📍 ${resort.region}</div>
    <div class="factor-badges">${badges}</div>
    <div id="panel-desc">${resort.description}</div>
    <div class="climate-info">🌤 <b style="color:#6b4e2a">Климат:</b> ${resort.climate}</div>
    <div class="section-title">Санатории</div>
    ${sanList}
    <div class="section-title">Как добраться</div>
    <div class="how-to">✈ ${resort.access}</div>
    <div style="height:16px"></div>`;

  panel.classList.add('open');
  map.dragging.disable();
}

const reviewCache={};

async function toggleReviews(uid,nameEnc,descEnc){
  const name=decodeURIComponent(nameEnc);
  const desc=decodeURIComponent(descEnc);
  const block=document.getElementById('rev_'+uid);
  if(!block)return;

  if(block.classList.contains('open')){block.classList.remove('open');return;}
  block.classList.add('open');

  if(reviewCache[uid]){block.innerHTML=reviewCache[uid];return;}

  block.innerHTML=`<div class="reviews-loading">⏳ Загружаем отзывы…</div>`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        system:'Ты генерируешь реалистичные короткие отзывы о российских санаториях на основе их характеристик. Отвечай ТОЛЬКО валидным JSON-массивом, без markdown, без пояснений.',
        messages:[{role:'user',content:`Создай 3 коротких отзыва (2-3 предложения) о санатории "${name}". Контекст: ${desc}. Отзывы: разные по тону (положительный, нейтральный, с небольшим замечанием). Имена женские, русские. Верни JSON: [{"author":"Имя","date":"месяц год","rating":4.5,"text":"текст"}]`}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'[]';
    const reviews=JSON.parse(text.replace(/```json|```/g,'').trim());
    const html=reviews.map(r=>`
      <div class="review-item">
        <div class="review-meta">
          <span class="review-author">${r.author}</span>
          <span class="review-date">${r.date}</span>
        </div>
        <div class="review-stars" style="color:#e8a820">${starFill(r.rating)} ${r.rating}</div>
        <div class="review-text">${r.text}</div>
      </div>`).join('');
    reviewCache[uid]=html;
    block.innerHTML=html;
  }catch(e){
    block.innerHTML=`<div class="reviews-loading">Не удалось загрузить. <a href="https://yandex.ru/maps/?text=${encodeURIComponent(name)}" target="_blank" style="color:#8a6a2a">Открыть на Яндекс Картах →</a></div>`;
  }
}

function closePanel(){panel.classList.remove('open');map.dragging.enable();}
document.getElementById('panel-close').onclick=closePanel;
document.getElementById('panel-handle').onclick=closePanel;
map.on('click',()=>{if(panel.classList.contains('open'))closePanel();});

// Легенда
const lt=document.getElementById('legend-toggle'),lb=document.getElementById('legend-body');
let lo=true;
lt.onclick=()=>{lo=!lo;lb.classList.toggle('hidden',!lo);lt.classList.toggle('collapsed',!lo);};

// Telegram
if(window.Telegram?.WebApp){const tg=window.Telegram.WebApp;tg.ready();tg.expand();}

// Toast
function showToast(msg,d=3200){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}
setTimeout(()=>showToast('🗺 Нажмите на цветной круг для информации о курорте'),1600);
